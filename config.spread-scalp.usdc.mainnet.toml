# ─── SpreadScalp on USDC majors — MAINNET ──────────────────────────────────
#
# 4 fixed bots on BTCUSDC/ETHUSDC/BNBUSDC/DOGEUSDC. SS strategy
# captures spread between best bid + ask, takes profit on the
# opposite-side maker close.
#
# Why min_spread_bps = 0?
#   Binance USDC futures = 0 maker fee (promo). No fee floor to
#   clear — any captured spread is pure profit. Quote on every
#   tick of spread, however thin.
#   Verify current rate: binance.com/en/fee/futureFee
#
# Caveats:
#   - Adverse selection still applies. 0-fee doesn't fix bad fills.
#   - Min_spread=0 means the bot quotes even on 1-bps books; on
#     majors USDC books are very tight, fill rate may be low.
#   - Fixed bot list — no rotation. Each symbol gets its own
#     persistent state under state/<symbol>/.
#
# Pre-flight:
#   1. TIKR_BINANCE_ENABLE_MAINNET=1
#   2. .env with TIKR_BINANCE_FUTURES_API_KEY / _API_SECRET
#   3. Funded USDC balance in Futures wallet
#   4. Confirm USDC maker fee still 0 bps

[account]
env = "futures-mainnet"
state_dir = "./state/spread-scalp-usdc"
asset = "USDC"
order_balance_pct = "1"
max_position_pct = "100"
leverage = 5

# ─── BTCUSDC ───────────────────────────────────────────────────────────────
#
# Tick = 0.10 on ~$60k price = ~0.017 bps. Tightest of the bunch.
# Notional 120 ≈ 0.002 BTC at this price.

[[bot]]
symbol = "BTCUSDC"
strategy = "spread-scalp"

[bot.spread_scalp]
notional = 120
min_spread_bps = 0
# quote_offset_ticks = 0 → join at touch. Legacy default (-1) quotes
# INSIDE the touch and needs 2+ tick book spread; USDC majors run
# 1-tick books so legacy mode places zero orders.
quote_offset_ticks = 0
close_target_ticks = 1
requote_interval_ms = 500
max_position_usdt = 200
reject_cooldown_ms = 500
price_tolerance_ticks = 1
adverse_stop_after_secs = 120
adverse_stop_drift_bps = 30


