# ─── Defaults reference (commented) ────────────────────────────────────────
# Every Hydra knob with its default value, for experimentation. The
# blocks above set what's worth setting; this lists what you could also
# tune.
#
# [bot.hydra]
# notional               # required (per straddle leg + per add, USDT)
# entry_offset_bps = 100 # straddle distance from mid
# pyramid_step_bps = 50  # favorable-drift band → pyramid add
# pyramid_max_adds = 2   # 0 disables pyramid arm
# dca_step_bps     = 60  # adverse-drift band → DCA add
# dca_max_adds     = 1   # 0 disables DCA arm
# tp_bps_from_avg  = 30  # TP target offset from rolling avg_entry
# sl_bps_from_first= 60  # SL offset from ORIGINAL first-fill price
# max_position_usdt= 0   # 0 falls back to account-level cap
# add_cooldown_ms  = 1000# min elapsed between adds
