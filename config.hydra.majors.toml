# Hydra on the major-cap pairs (BTC, ETH, BNB, SOL, DOGE).
#
# Run with:
#   tikr --config ./config.hydra.majors.toml
#
# ─── Strategy summary ──────────────────────────────────────────────────────
# Hydra plants a passive PostOnly Bid+Ask straddle at `entry_offset_bps`
# from mid. First leg to fill locks direction; the other leg is cancelled.
# Held position:
#   - TP via passive close-side limit at `avg_entry × (1 ± tp_bps_from_avg)`
#     — refreshed when avg shifts after pyramid / DCA adds. Maker fee.
#   - SL via IOC at touch when mid drifts `sl_bps_from_first` adverse from
#     the ORIGINAL first-fill price (never the rolling avg — DCA can't drag
#     the trigger out indefinitely). Taker fee on the loser.
#   - Pyramid adds (IOC at touch) on favorable drift bands; DCA adds on
#     adverse drift bands. Both capped at `max_position_usdt`.
#
# ─── Per-symbol entry_offset tuning ────────────────────────────────────────
# 72h backtest winners with the v2 maker-exit + asymmetric-mult tuning
# (TP=30, SL=35, pyramid×1.5, dca×0.5):
#   BNB eo=50, BTC eo=100, DOGE eo=50, ETH eo=50, SOL eo=50.
# Tighter SL flipped optimal entry-offset to mostly eo=50 (the wider
# brackets gave fewer fills per unit time — losing the volume game even
# though per-trade edge was better). BTC stayed at eo=100 because its
# book is thin enough that eo=50 churns too many losers.
#
# ─── Fees ──────────────────────────────────────────────────────────────────
# Binance Futures USD-M tier 0: 2 bps maker / 5 bps taker. With maker-exit
# v1, a TP round-trip = 2 + 2 = 4 bps. An SL round-trip = 2 + 5 = 7 bps.
# v2 winner is tp=30 / sl=35 → win pays 26 bps (TP, maker-maker = 4bps
# round-trip), loss costs 42 bps (SL, maker-taker = 7bps round-trip) →
# break-even win rate 62%. The pyramid×1.5 boost on favorable drift
# bumps the average winning trade's notional, so the realized PnL
# advantage compounds beyond the bare win-rate math.
#
# ─── Account ───────────────────────────────────────────────────────────────
[account]
env = "futures-testnet"
state_dir = "./state"

# 5 bots × 0.4% margin per bot = 2% of margin balance deployed.
order_balance_pct = "2"

# key_file = "./keys/binance-testnet.txt"


# ─── BTCUSDT ───────────────────────────────────────────────────────────────
[[bot]]
symbol = "BTCUSDT"
strategy = "hydra"

[bot.hydra]
notional = 120
entry_offset_bps = 100
pyramid_step_bps = 50
pyramid_max_adds = 2
dca_step_bps = 60
dca_max_adds = 1
tp_bps_from_avg = 30
sl_bps_from_first = 35
max_position_usdt = 500
add_cooldown_ms = 1000
pyramid_size_mult = "1.5"
dca_size_mult = "0.5"


