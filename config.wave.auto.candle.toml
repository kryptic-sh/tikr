# ─── Rampage AUTO-rotation — Wave + ADAPTIVE candle-vol lattice (iter2) ────────
#
# Same auto-rotation as config.toml, but the Wave strategy runs the ADAPTIVE
# volatility-sized lattice ("iter2"): the level spacing is re-sized to recent
# volatility instead of a fixed step.
#
# How the adaptive lattice works:
#   - Track the last `candle_count` candles of `candle_secs` each (here 10 × 60s
#     = a 10-minute rolling window) and average their (high−low)/low range in bps.
#   - effective step bps = step_volatility_mult × avg_candle_range_bps, floored
#     at `step_bps` and coarse-quantized (so noise doesn't nudge it).
#   - Every `lattice_adjust_secs`, if that step moved past a 30% hysteresis band
#     (a real vol regime shift), fully re-lattice: cancel all + re-freeze the grid
#     at the current touch with the new step (the cover side clamps to cost so it
#     never rests sells below break-even).
#   - Calm market → tight step (more fills); volatile → wide step (slower
#     accumulation, smaller bag). step_bps is the FLOOR.
#
# Set step_volatility_mult = "0" OR lattice_adjust_secs = 0 to disable adaptive
# and fall back to a plain frozen lattice at `step_bps`.
#
# NOTE vs config.toml: chase = false here (one-sided hold-and-revert — the mode
# the adaptive lattice was backtested in), and step_bps is the FLOOR (10), not a
# fixed 30.
#
# ⚠ Live, real money. Backtested on NEAR/SUI/WLD/ZEC 72h windows; the apparent
# edge is concentrated in volatile oscillators and holds larger bags than the
# chase=true frozen baseline (peak ≈ a few hundred to ~$3.4k notional, well under
# the balance×leverage margin cap). Watch the first sessions.

[account]
env = "futures-mainnet"
state_dir = "./state/wave-auto-candle"
asset = "USDT"
order_balance_pct = "0.1"
max_position_pct = "0"
leverage = 10
inventory_boost_pct = "0"
inventory_boost_curve = "1"

[rampage]
enabled = true
min_volume_usdt = "100000" # $100k 24h quote volume floor
recheck_interval_secs = 60
quote_asset = "USDT"
top_n = 10
# defer_underwater defaults true (don't rotate a bot holding a losing bag)
rotate_loss_pct = "1" # allow a hotter market to evict this bot only if its NET loss ≤ 1% of wallet

[rampage.score]
mode = "candle_height" # "candle_height" (Wave signal) | "tick_bps" (Tide signal)
[rampage.score.params]
candle_count = 30    # average the last 30 one-minute candles (~30m window) to rank markets
min_candle_pct = "0" # min avg candle height % to qualify (0 = no floor)

[rampage.strategy]
kind = "wave" # "wave" | "tide"
[rampage.strategy.params]
grid_levels = 10
step_bps = 10        # FLOOR — adaptive sizes the step UP from here with volatility
inner_steps = 0
refill_threshold = 5
chase_to_avg = false
chase = false
# ─── adaptive vol-sized lattice (iter2) ───
step_volatility_mult = "0.5"  # step_bps = mult × avg candle range bps; "0" = adaptive OFF
lattice_adjust_secs = 15      # re-evaluate the step this often (seconds); 0 = adaptive OFF
candle_count = 10             # candles in the rolling vol window
candle_secs = 60              # candle period → 10 × 60s = 10-minute window
