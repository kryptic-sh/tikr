# ─── Rampage AUTO-rotation — Wave (pure frozen lattice) ───────────────────────
#
# Same auto-rotation as config.toml: rank markets by avg 1m candle height, run a
# Wave bot on the top `top_n`. Wave is the pure frozen fixed-step lattice — the
# grid is computed once at start and never recenters, resizes, or chases.
#
# Geometry knobs (the only four):
#   - steps_bps   — bps of mid per lattice step (level spacing).
#   - steps_inner — lattice slots skipped between mid and the first order/side.
#   - levels      — orders per side.
#   - round_trips — completed round-trips (≥ N bids AND ≥ N asks drained) before
#                   a refill; a whole side emptying refills regardless.
#
# ⚠ Live, real money. One-sided accumulation is bounded only by step width ×
# order size on a one-way move — keep steps_bps wide enough and notional small.

[account]
env = "futures-mainnet"
asset = "USDT"
order_balance_pct = "0.1"
max_position_pct = "0"
leverage = 10
inventory_boost_pct = "0"
inventory_boost_curve = "1"

[rampage]
enabled = true
min_volume_usdt = "100000" # $100k 24h quote volume floor
recheck_interval_secs = 60
quote_asset = "USDT"
top_n = 10
# defer_underwater defaults true (don't rotate a bot holding a losing bag)
rotate_loss_pct = "1" # allow a hotter market to evict this bot only if its NET loss ≤ 1% of wallet

[rampage.score]
mode = "candle_height" # "candle_height" (Wave signal) | "tick_bps" (Tide signal)
[rampage.score.params]
candle_count = 30    # average the last 30 one-minute candles (~30m window) to rank markets
min_candle_pct = "0" # min avg candle height % to qualify (0 = no floor)

[rampage.strategy]
kind = "wave" # "wave" | "tide"
[rampage.strategy.params]
levels = 10
steps_bps = 10       # bps of mid per lattice step (level spacing)
steps_inner = 0      # slots skipped mid → first order (0 = at the touch)
round_trips = 5      # round-trips before a refill (side-empty refills regardless)
