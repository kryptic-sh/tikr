# ─── DOGEUSDT ──────────────────────────────────────────────────────────────
#
# Wider native spread (3-5 bps typical) — most active SS bot in the
# basket. Bumped `min_spread_bps=8` so accepted fills clear fees with
# meaningful capture.

[[bot]]
symbol = "DOGEUSDT"
strategy = "spread-scalp"

[bot.spread_scalp]
notional             = 25
min_spread_bps       = 8
requote_interval_ms  = 1000
max_position_usdt    = 100
take_profit_usdt     = 1.0
reject_cooldown_ms   = 2000


# Defaults reference (uncomment to override):
# tick_size            = "0.0001"  # optional; auto-detected from exchangeInfo
# notional             = 25        # fiat $ per order
# min_spread_bps       = 5         # minimum market spread to quote
# requote_interval_ms  = 1000      # fixed requote interval
# max_position_usdt    = 0         # 0 = uncapped (use balance × leverage)
# take_profit_usdt     = 0         # 0 = TP disabled
# reject_cooldown_ms   = 2000      # 0 = no cooldown (legacy)
