# SpreadScalp on the major-cap pairs currently active in `config.toml`
# (BTC, ETH, BNB, SOL, DOGE). Fixed-symbol layout — no rotation — so the
# strategy can build up symbol-specific state.
#
# Run with:
#   tikr --config ./config.spread-scalp.majors.toml
#
# ─── Caveat ────────────────────────────────────────────────────────────────
# Spread on major-cap perps is usually 0.5-3 bps. Tier-0 Binance Futures
# round-trip fee is 4 bps. SpreadScalp won't quote until book spread
# exceeds `min_spread_bps` — set just above the fee floor so the bot only
# wakes up on momentary widening bursts (news, liq cascades, low-volume
# windows). Expect long idle stretches between fills on BTC/ETH; DOGE
# will be the most active.
#
# ─── Stage 4-6 knobs ──────────────────────────────────────────────────────
# After the refactor, the per-bot block accepts:
#   take_profit_bps         (preferred over `take_profit_usdt`; bps-of-notional)
#   stop_loss_bps           (new — bounded downside, IOC-flatten at touch)
#   price_tolerance_ticks   (skip requote within ±N ticks; default 1)
#   adverse_window_ms       (>0 turns on dynamic min_spread widening)
#   adverse_half_life_fills, adverse_threshold_bps, adverse_max_widen_bps
#
# Defaults are listed at the bottom of this file.

# ─── Account ───────────────────────────────────────────────────────────────
[account]
env = "futures-testnet"
state_dir = "./state"

# 1% of margin balance split across 5 bots = 0.2% per bot per order.
# Per-bot strategy `notional` below overrides this when set explicitly.
order_balance_pct = "1"

# key_file = "./keys/binance-testnet.txt"


# ─── BTCUSDT ───────────────────────────────────────────────────────────────
#
# Typical spread 0.5-1 bps; will fire only on widening events. High
# `min_spread_bps` to avoid losing money on fees alone. **No TP** — we
# let the opposite-side maker quote close the position at maker fees
# (2bps) instead of paying taker (5bps) via an IOC. Live a/b showed
# the IOC TP path eats ~3bps per round-trip vs the natural close.
# SL kept at 20 bps to cap a bad fill before it grinds.

[[bot]]
symbol = "BTCUSDT"
strategy = "spread-scalp"

[bot.spread_scalp]
notional = 120
min_spread_bps = 5
requote_interval_ms = 1000
max_position_usdt = 200
reject_cooldown_ms = 2000
price_tolerance_ticks = 1


