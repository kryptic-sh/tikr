# ─── TouchRefill USDC majors-only — MAINNET ─────────────────────────────
#
# USDC-margined perpetuals, restricted to bigger crypto markets.
# Uses /fapi/v1/* (same as USDT-M, only quote-asset filter changes).
#
# Why this set?
#   - USDC promo = 0 bps maker (verify at binance.com/en/fee/futureFee).
#     Full min_self_spread_bps becomes net profit per RT.
#   - Majors have the deepest USDC books → fewer adverse-selection
#     surprises than the long-tail USDC perps.
#   - Liquidity ensures fills actually happen (USDC perps are much
#     thinner than USDT equivalents).
#
# Pre-flight:
#   1. TIKR_BINANCE_ENABLE_MAINNET=1
#   2. .env with TIKR_BINANCE_FUTURES_API_KEY / _API_SECRET
#   3. Funded USDC balance in Futures wallet (NOT USDT)
#   4. Confirm USDC maker fee still 0 bps

[account]
env = "futures-mainnet"
state_dir = "./state/touch-refill-usdc-majors"
order_balance_pct = "1"
max_position_pct = "100"
leverage = 5

[touch_refill_auto]
enabled = true
quote_asset = "USDC"

# Allowlist: only spawn bots on these symbols. Filters still apply
# (min_tick_bps + min_volume), but candidates further restricted.
# Add/remove symbols here to scope the fleet. Skip BTCUSDC because
# its tick_bps is too tiny (price too high) — would require huge
# min_self_spread to clear fees.
symbols_allowlist = [
    "ETHUSDC",
    "BNBUSDC",
    "SOLUSDC",
    "XRPUSDC",
    "DOGEUSDC",
    "ADAUSDC",
    "AVAXUSDC",
    "LINKUSDC",
    "SUIUSDC",
    "1000PEPEUSDC",
    "1000SHIBUSDC",
    "WIFUSDC",
    "WLDUSDC",
    "ARBUSDC",
]

# Still apply tick + volume filters. 6 bps clears any potential
# fee revert (0→1.8 maker would be 3.6 bps RT) with margin.
min_tick_bps = "6"

# USDC volumes much smaller than USDT. $5M floor surfaces the active
# majors without including dead listings.
min_volume_usdt = "5000000"

recheck_interval_secs = 60

# 8 bps min spread = ~5 bps net edge at 0-bps-maker promo rates.
# Tighter than USDT config because USDC fee saving lets us be more
# aggressive on the spread.
min_self_spread_bps = 8

# Smaller grid — thinner USDC books mean less safe inventory accumulation.
grid_levels = 3

# Wider close target = more profit per RT. USDC books are slow,
# fewer fills, so make each one count more.
close_profit_bps = 15
