# ─── Account ───────────────────────────────────────────────────────────────
[account]
# "futures-testnet" | "futures-mainnet"
env = "futures-testnet"

state_dir = "./state"


# Rotating scalp mode: keep 4 live SpreadScalp bots assigned to the most
# volatile USDT futures markets. On rotation, old symbols are stopped,
# open orders are canceled, and any open position is flattened before the
# next assignment starts.
[scalp_rotation]
enabled = true
slots = 4
refresh_secs = 300
quote_asset = "USDT"
min_quote_volume = 50000000

# Optional allow-list. Empty = scan all USDT futures symbols.
# candidates = ["DOGEUSDT", "HYPERUSDT", "PROMPTUSDT", "XRPUSDT", "1000PEPEUSDT"]


# SpreadScalp template. Rotation copies these params onto each selected symbol.
# Symbol here is only a fallback/template seed; rotation replaces it with the
# current most-volatile symbols and auto-detects tick_size/min_notional.
[[bot]]
symbol = "DOGEUSDT"
strategy = "spread-scalp"
[bot.spread_scalp]
notional = 5
improve_ticks = 1
min_requote_interval_ms = 5000
requote_tick_threshold = 3
force_requote_interval_ms = 60000
min_quote_edge_bps = 4
flatten_threshold_notional = 20
skew_unit_notional = 10
max_skew_ticks = 2


# Defaults:
# notional = 25                 # fiat $ per order; auto-bumps to min_notional × 1.2
# tick_size = "0.0001"          # optional; auto-detected from Binance exchangeInfo
# improve_ticks = 1             # ticks inside best bid/ask; 0 joins best bid/ask
# min_requote_interval_ms = 5000 # hard throttle for normal cancel/replace cycles
# requote_tick_threshold = 3     # price must drift this many ticks before requote
# force_requote_interval_ms = 60000 # safety refresh; 0 disables
# min_quote_edge_bps = 4         # minimum gross edge between our bid/ask before fees/slippage
# flatten_threshold_notional = 20 # one-sided flatten mode starts here; 0 disables
# skew_unit_notional = 10        # notional where max_skew_ticks is fully applied; 0 disables
# max_skew_ticks = 2             # long shifts quotes down; short shifts quotes up
