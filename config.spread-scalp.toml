# ─── Account ───────────────────────────────────────────────────────────────
[account]
# "futures-testnet" | "futures-mainnet"
env = "futures-testnet"

state_dir = "./state"


# Rotating scalp mode: keep 4 live SpreadScalp bots assigned to the most
# volatile USDT futures markets. On rotation, old symbols are stopped,
# open orders are canceled, and any open position is flattened before the
# next assignment starts.
[scalp_rotation]
enabled = true
slots = 4
refresh_secs = 120
quote_asset = "USDT"
min_quote_volume = 50000000

# Optional allow-list. Empty = scan all USDT futures symbols.
# candidates = ["DOGEUSDT", "HYPERUSDT", "PROMPTUSDT", "XRPUSDT", "1000PEPEUSDT"]


# SpreadScalp template. Rotation copies these params onto each selected symbol.
# Symbol here is only a fallback/template seed; rotation replaces it with the
# current most-volatile symbols and auto-detects tick_size/min_notional.
[[bot]]
symbol = "DOGEUSDT"
strategy = "spread-scalp"
[bot.spread_scalp]
notional = 5
min_spread_bps = 12
requote_interval_ms = 1000
take_profit_usdt = 1.0     # lock in small profits early

# Adverse-drift hard stop (2026-05-25 sweep winner on DOGE 33h):
# if position held >adverse_stop_after_secs AND mid drifts
# >=adverse_stop_drift_bps against direction, IOC close at touch.
# Caps the bad-tail when reversion never comes. Lifted banked profit
# 4.20 → 8.10 (+93%) vs unstopped baseline.
adverse_stop_after_secs = 120
adverse_stop_drift_bps = 30


# Defaults:
# notional = 25                 # fiat $ per order; auto-bumps to min_notional × 1.2
# tick_size = "0.0001"          # optional; auto-detected from Binance exchangeInfo
# min_spread_bps = 5            # minimum market spread in bps required to quote
# requote_interval_ms = 1000    # fixed requote interval in ms
# adverse_stop_after_secs = 120 # held > N secs + drift adverse triggers IOC stop
# adverse_stop_drift_bps = 30   # 0 to disable
# close_decay_after_secs_1 = 0  # time-decay close-target (off — sweep showed -77% banked)
# close_decay_factor_1 = 1.0
# close_decay_after_secs_2 = 0
# close_decay_factor_2 = 1.0
