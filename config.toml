# ─── Wave AUTO-rotation — MAINNET (default config) ────────────────────────
#
# No fixed bot list. The [wave_auto] manager scores every liquid USD-M perp by
# RECENT PRICE ACTION and runs Wave on the top N. Re-ranks every recheck.
#
# Score = average height of the last `candle_count` 1-minute candles, as a
# percent: mean( (high − low) / low × 100 ), wicks included. Big 1-minute
# candles = lots of intra-minute oscillation for the frozen lattice to bank —
# the GUN signature. This is a RECENT signal, so it catches a market that just
# woke up, unlike a 24h aggregate that dilutes it.
#
# Each recheck: list perps + price + 24h volume (cheap), pre-filter by
# `min_volume_usdt`, then fetch the last `candle_count` 1m klines for each
# survivor (concurrent), score, and run Wave on the top `top_n` (avg candle %
# ≥ `min_candle_pct`).
#
# Rotation is graceful: a symbol that drops out only rotates when its bot is
# flat or GREEN. Holding an underwater bag? It keeps running until recovered
# (defer_underwater, default on) — rotation never crystallizes a loss.
#
# WHY USDT: the volatile small-cap oscillators (GUN-likes) live on USDT perps;
# USDC perps are mostly the tight majors. Discovery scans USDT, so the futures
# wallet needs USDT margin.
#
# ⚠ Live, real money. Wave adds into a trend; big 1m candles can be a trend as
# easily as chop. The defer-underwater guard + (optional) SL are the backstops.
# Watch the first sessions; size so summed peaks stay under buying power.
#
# Pre-flight (mainnet): TIKR_BINANCE_ENABLE_MAINNET=1; .env keys; funded USDT
# in the Futures wallet; confirm maker fee at binance.com/en/fee/futureFee.

[account]
env = "futures-mainnet"
state_dir = "./state/wave-auto"
asset = "USDT"
order_balance_pct = "0.1"
max_position_pct = "0"
leverage = 10
inventory_boost_pct = "0"
inventory_boost_curve = "1"

[wave_auto]
enabled = true
min_volume_usdt = "2000000" # $2M 24h quote volume floor (liquidity + bounds kline calls)
candle_count = 60           # average the last 60 one-minute candles (~1h window)
min_candle_pct = "0"        # min avg candle height % to qualify (0 = no floor)
top_n = 10                  # run Wave on the 5 highest-scored symbols
recheck_interval_secs = 60
quote_asset = "USDT"
# defer_underwater defaults true (don't rotate a bot holding a losing bag).
# Forwarded to every spawned Wave bot.
grid_levels = 10
refill_threshold = 5
step_bps = 10
inner_steps = 2
chase_to_avg = false
chase = true
