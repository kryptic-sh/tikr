# ─── Wave on USDC majors — MAINNET ────────────────────────────────────────
#
# 4 bots: NEARUSDC, ZECUSDC, WLDUSDC, SUIUSDC. Wave = frozen fixed-step
# lattice + round-trip refill. USDC promo (0 bps maker).
#
# Lineup rotated 2026-05-28: SOL/BNB/DOGE (low vol, weak performers) swapped
# for higher-volatility USDC perps that resemble ZEC's profile (high realized
# range + liquidity → more grid oscillation). Selection by volatility +
# volume, NOT spread (the fixed lattice ignores the live touch). NONE of the
# new names are backtested — same unvalidated posture as ZEC; watch the first
# live sessions, and note higher vol means higher peak inventory than the SOL
# figures below.
#
# Refill fires when EITHER a both-sides round-trip completes (bid AND ask
# each drained ≥ refill_threshold) OR one whole side is empty (re-arm after
# a one-sided sweep — integral, not optional). Lattice never recenters; the
# active window slides over the fixed grid and prunes the tail.
#
# `step_bps` is the single geometry knob — it sets BOTH the inner self-spread
# (gap from mid to the first order each side) AND the spacing between levels.
#
# Tuned 2026-05-29 on the real ~54h DOGE + SOL snapshots (maker 0 / taker 0
# USDC promo, $600 @ 1% ≈ $6/order, 5x). Winning config:
# levels=4 / refill_threshold=2 / step_bps=2 / step_increment_bps=1.
#   DOGE 54h: NET +4.32 (realized +5.15, unreal -0.66), peak ~$665
#   SOL  54h: NET +7.04 (realized +8.37, unreal -1.20), peak ~$619
# Key findings (this run):
#   - PROGRESSIVE lattice (step_increment_bps=1) is the unlock: gaps widen
#     outward (2,3,4,5 bps → cumulative 2,5,9,14), so the tight inner levels
#     capture spread while the widening tail spans enough range that the
#     limited $600 funds don't exhaust at the cap → unrealized bleed ≈ 0.
#     Uniform step=2 (inc=0) LOST on both (DOGE -3.36, SOL -4.43, unreal ~-2.8).
#   - FEWER levels + faster refill (4 / rt=2) beats 10 / rt=9: concentrates
#     capital in the high-fill inner band and banks far more round-trips
#     (SOL realized +0.9 → +8.4). The deep outer slots in lv=10 sat idle.
#   - CAVEAT: validated on DOGE + SOL only (the two real ~54h datasets). NONE
#     of the live names (NEAR/ZEC/WLD/SUI) are backtested on this config —
#     NEAR/SUI snapshots are only ~4.5h, ZEC/WLD have none. Same unvalidated
#     posture as before; watch the first live sessions. The profit surface is
#     also noisy across (step,inc) — the bleed-elimination is robust, the exact
#     optimum is not. Earlier note: a wide UNIFORM step bounds inventory but
#     the progressive tail does it better while keeping the inner capture.
#
# BTC EXCLUDED: 0.001 BTC lot ≈ $100/order, peaks ~$3k inventory — exceeds a
# $600 @ 5x account's capacity. Do not add BTCUSDC here.
#
# RISK ($600 @ 5x): worst per-market peak in the 72h backtest ~$953 at
# $10/order → ~$570 at this account's ~$6/order → ~$114 margin at 5x. A ~19%
# adverse move on that ≈ $108 loss. Wave still has NO hard cap and adds into
# a trend, but the wide step keeps the excursion survivable. Watch sustained
# one-way moves; size so summed peaks stay well under buying power.
#
# Pre-flight:
#   1. TIKR_BINANCE_ENABLE_MAINNET=1
#   2. .env with TIKR_BINANCE_FUTURES_API_KEY / _API_SECRET
#   3. Funded USDC balance in Futures wallet
#   4. Confirm USDC maker fee still 0 bps at binance.com/en/fee/futureFee

[account]
env = "futures-mainnet"
state_dir = "./state/wave-usdc-majors"
asset = "USDC"
order_balance_pct = "1"
max_position_pct = "100"
leverage = 5

# ─── NEARUSDC ($5 floor) ──────────────────────────────────────────────────
# Replaces SOLUSDC. ~19% 24h range, ~$42M vol — most ZEC-like (high vol +
# liquid). Unvalidated.
[[bot]]
symbol = "NEARUSDC"
strategy = "wave"
[bot.wave]
grid_levels = 4
refill_threshold = 1
inner_bps = 5
step_bps = 5
step_increment_bps = 0

# ─── ZECUSDC ($5 floor) ───────────────────────────────────────────────────
# Swapped in for ETHUSDC (ETH min notional ~$20 on USDC perps, too large for
# this account). NOT backtested — no ZEC snapshot; running on the winning
# params unvalidated, watch first live session.
[[bot]]
symbol = "ZECUSDC"
strategy = "wave"
[bot.wave]
grid_levels = 4
refill_threshold = 1
inner_bps = 5
step_bps = 5
step_increment_bps = 0

# ─── WLDUSDC ──────────────────────────────────────────────────────────────
# Replaces DOGEUSDC. Highest vol of the set (~28% 24h range, ~$21M vol) →
# highest reward but also highest inventory/pile risk on one-way moves. Watch
# closely. Unvalidated.
[[bot]]
symbol = "WLDUSDC"
strategy = "wave"
[bot.wave]
grid_levels = 4
refill_threshold = 1
inner_bps = 5
step_bps = 5
step_increment_bps = 0

# ─── SUIUSDC ($5 floor) ───────────────────────────────────────────────────
# Replaces BCHUSDC (BCH lagged — its 24h range was a down-trend, not chop, so
# little wave oscillation). SUI: ZEC-like vol (~12% range) + strong liquidity
# (~$19M). Unvalidated.
[[bot]]
symbol = "SUIUSDC"
strategy = "wave"
[bot.wave]
grid_levels = 4
refill_threshold = 1
inner_bps = 5
step_bps = 5
step_increment_bps = 0
