[account]
env = "futures-mainnet"
asset = "USDC"
order_balance_pct = "0.5"
max_position_pct = "0"
auto_scale = true                       # wallet-aware: N = min(rampage.top_n, floor(wallet/min_bot_capital_usdc)); each bot orders (wallet/N)×order_balance_pct
min_bot_capital_usdc = "250"            # margin gate: $250 wallet per bot (e.g. $519 → 2 bots)
take_profit_pct = "0"                   # unrealized > 2% of wallet → rest a reduce-only maker limit to lock in HALF the bag; 0 = off
leverage = 25
inventory_boost_pct = "50"              # profit-gated reducing-side size boost: enlarge reducing orders up to +25% as they sit further past avg
inventory_boost_curve = "1"
inventory_boost_profit_gated = true     # gate the boost on per-order profit vs avg (never enlarge a loss-locking quote); works cap-off
inventory_boost_profit_full_bps = "100" # boost saturates at 150bps past avg-entry
bnb_refill_enabled = true               # this is the manager process; enable on exactly ONE process per account
# bnb_min_balance_usdc = "1"     # refill trigger (default $1)
# bnb_target_balance_usdc = "10" # top-up target (default $10)

# Bagger (inventory-risk flatten) — profit lock (ratchet): snapshot MTM equity
# (wallet + unrealized); once equity grows +2% past the snapshot, flatten the
# WHOLE bag to bank the gain, then re-snapshot at the new (higher) equity. A
# monotonic profit ratchet — each +2% of growth is realized and the bar steps up.
# All other mechanisms off.
[account.bagger]
#profit_lock_pct = "2" # bank the bag + re-baseline every +2% equity growth
#loss_lock_pct = "3"   # cut the bag + re-baseline every −2% equity drop (two-sided bracket)
#exit_taker = false    # reduce-only maker exit (don't pay the spread)

[rampage]
enabled = true
min_volume_usdc = "20000000" # $20M 24h quote volume floor
recheck_interval_secs = 60
quote_asset = "USDC"
top_n = 10
# defer_underwater defaults true (don't rotate a bot holding a losing bag)
rotate_loss_pct = "0.01" # accept NET loss up to 1% of wallet on rotate (NET = realized+unrealized−fees)
big_bag_pct = "0"        # hold (don't rotate) a bot in POSITIVE unrealized whose bag ≥ this % of wallet — work it down instead of dumping; 0 = off
retire_bnb_pct = "50"    # on retire, convert this % of the bot's final NET PROFIT to BNB (VIP-tier fee accrual); loss = no-op; 0 = off

[rampage.score]
mode = "candle_height" # "candle_height" (Wave signal) | "tick_bps" (Tide signal)
[rampage.score.params]
candle_count = 30    # average the last 60 one-minute candles (~1h window)
min_candle_pct = "0" # min avg candle height % to qualify (0 = no floor)

[rampage.strategy]
kind = "wave" # "wave" | "tide"
[rampage.strategy.params]
levels = 20
round_trips = 10
steps_bps = 1
auto_inner = true            # inner dead-zone auto-sized to ~½ avg 60×1s candle gap; steps_inner ignored
steps_inner = 0              # only used when auto_inner = false
force_refill_secs = 30       # slow-market valve: refill vacant slots after 5min regardless of round_trips; 0 = off
auto_step = false            # auto-size the lattice step (k×mean candle gap, floored at 2× maker fee, capped at steps_bps); false = fixed steps_bps
auto_step_k = "0.25"         # when auto_step=true: each step targets this fraction of the mean 1s candle range
auto_candle_window = 10      # trailing 1s candles averaged for the auto-step/auto-inner vol signal (fewer = faster reaction)
relattice_drift_pct = "0.02" # relattice/reposition deadband: re-place only when computed step differs from placed by ≥ this fraction
size_mult = "1"              # geometric order-size multiplier per lattice step (deeper orders bigger); 1.0 = uniform
