# tikr-dashboard configuration.
#
# Discovery order when `--config` is not passed:
#   1. ./config.toml         (this file — wins if cwd has one)
#   2. $XDG_CONFIG_HOME/tikr/config.toml   (default: ~/.config/tikr/config.toml)
#
# Convention: commented-out lines equal the in-code defaults. Drop the
# `#` to keep them explicit, edit the value to override.

# ─── Account ───────────────────────────────────────────────────────────────
[account]
# "futures-testnet" | "futures-mainnet"
env = "futures-testnet"

# Per-bot snapshot subdirs live under <state_dir>/<symbol>/...
state_dir = "./state"

# Account margin-balance percent allocated to computed per-order size.
# Split evenly across bots: 10 with 2 bots => 5% balance per bot/order.
# Per-bot strategy `notional = ...` overrides this computed value.
order_balance_pct = "1"

# Multiplier applied to wallet balance before sizing, usually account leverage.
# Effective pool = wallet_balance * margin_multiplier * order_balance_pct.
# margin_multiplier = "1"

# Optional HMAC key file (single line "key:secret"). Env vars
# TIKR_BINANCE_API_KEY / TIKR_BINANCE_API_SECRET take precedence.
# key_file = "./keys/binance-testnet.txt"


# # ─── BTCUSDT — every StaticGrid knob shown explicitly (reference) ──────────
#
# [[bot]]
# symbol = "BTCUSDT"
# strategy = "static-grid"
#
# [bot.sg]
# auto_skew = false
# # notional             = 25      # fiat $ per order; auto-bumps to min_notional × 1.2
# levels = 3 # default 3 — orders per side (2 × levels at cold start)
# # inner_bps            = 3       # nearest-level spread from mid in bps
# step_bps = 3 # default 3 — bps between consecutive same-side levels
# # target_fills_per_min = "0"     # 0 = adaptive scaler off
# # fillrate_window_secs = 60      # rolling window for the fpm measurement
# # scale_min            = "1.0"   # adaptive multiplier floor (1.0 = never tighten)
# # scale_max            = "4.0"   # adaptive multiplier ceiling (4× widening max)
# # auto_skew            = true    # false = symmetric ladder regardless of position
# #
# # Inventory skew is automatic — `pos_ratio = (position / notional) / levels`,
# # saturates when one side has filled every level. No external target.
# # Set `auto_skew = false` to disable: ladder stays symmetric at
# # `inner_bps + k·step_bps` from mid no matter the inventory.


