# ─── Wave on USDC majors — MAINNET ────────────────────────────────────────
#
# 4 bots: NEARUSDC, ZECUSDC, WLDUSDC, SUIUSDC. Wave = frozen fixed-step
# lattice + round-trip refill + chase_to_avg on the reducing side. USDC
# promo (0 bps maker).
#
# Refill fires when EITHER a both-sides round-trip completes (bid AND ask
# each drained ≥ refill_threshold) OR one whole side is empty (re-arm after
# a one-sided sweep — integral, not optional). Lattice never recenters; the
# active window slides over the fixed grid and prunes the tail.
#
# Geometry knobs (now matching Tide):
#   step_bps     = spacing between levels.
#   inner_steps  = dead-zone in STEPS (mid → first order = inner_steps × step);
#                  0 = at touch. (Renamed from the old bps-based inner_bps.)
#   chase_to_avg = reducing side chases past the origin toward avg_entry ∓ gap
#                  (gap = max(inner_steps,1) × step) but never past cost; the
#                  accumulating side stays one-sided/frozen.
#
# Tuned 2026-05-30 on data/72h (~25h slice, NEAR/ZEC/WLD/SUI), maker 0 / taker
# 0, $1000 @ 5x, order 0.5% (~$5), max_position_pct 70, boost 0, pinned 76/27ms
# latency. Winner:
#   levels=4 / refill_threshold=2 / step_bps=10 / inner_steps=2 / chase_to_avg.
#   Dependable (stable symbols): NEAR ~+23, SUI ~+41, ZEC ~+56 ≈ +120, peaks
#   ~$750 (well under the 70%-cap mark). WLD is a ±$50 wildcard (see caveat).
# Findings:
#   - lv=4–6 × rt=1–2 is a PLATEAU (~+110 to +140 total); differences inside
#     noise. lv=2 craters (WLD), lv=8 fades. step=10/inner=2 banks the most
#     round-trips; chase_to_avg lifts the trenders (WLD/NEAR) at a small cost
#     to ZEC — kept ON to raise the floor on the marginal names.
#   - ⚠ DETERMINISM: the backtest is NOT reproducible run-to-run (runner
#     reconciles on wall-clock, not sim-time). WLD swings ±$50 between
#     identical runs; NEAR/SUI/ZEC are stable (±$5). Treat single-run NET as
#     directional, not precise — esp. WLD. Fix pending before fine-tuning.
#   - Still a single ~25h TRENDING slice. Validate on a ranging window before
#     trusting; frozen grids change character across regimes.
#
# BTC EXCLUDED: 0.001 BTC lot ≈ $100/order, peaks ~$3k inventory — exceeds a
# $600 @ 5x account's capacity. Do not add BTCUSDC here.
#
# RISK: max_position_pct 70 caps entry notional at 0.70 × balance; peaks mark
# ~20–30% above that. Wave has no hard stop and adds into a trend, but the
# round-trip refill + chase_to_avg keep the excursion bounded. Watch sustained
# one-way moves; size so summed peaks stay well under buying power.
#
# Pre-flight:
#   1. TIKR_BINANCE_ENABLE_MAINNET=1
#   2. .env with TIKR_BINANCE_FUTURES_API_KEY / _API_SECRET
#   3. Funded USDC balance in Futures wallet
#   4. Confirm USDC maker fee still 0 bps at binance.com/en/fee/futureFee

[account]
env = "futures-mainnet"
state_dir = "./state/wave-usdc-majors"
asset = "USDC"
order_balance_pct = "0.5"
max_position_pct = "70"
leverage = 5
# Inventory-aware order-size boost (runner-side, every strategy). Scales the
# inventory-REDUCING side's order size up on a curve as |position| approaches
# the per-bot cap: multiplier = 1 + (pct/100)·(|pos|/cap)^curve.
# OFF: tail-risk hedge, not a profit enhancer — cuts net in normal regimes and
# barely moves peak once fills are realistic (the cap already binds).
inventory_boost_pct = "0"
inventory_boost_curve = "1"

# ─── NEARUSDC ($5 floor) ──────────────────────────────────────────────────
# ~19% 24h range, ~$42M vol — most ZEC-like (high vol + liquid). chase_to_avg
# lifts it (+9→+20 in tuning); a down-trender that benefits from unwinding to
# cost.
[[bot]]
symbol = "NEARUSDC"
strategy = "wave"
[bot.wave]
grid_levels = 4
refill_threshold = 2
step_bps = 10
inner_steps = 2
chase_to_avg = true

# ─── ZECUSDC ($5 floor) ───────────────────────────────────────────────────
# High vol + liquid. The steadiest performer (~+56); chase_to_avg costs it a
# little (it ranges) but it stays one of the best, so cta stays global.
[[bot]]
symbol = "ZECUSDC"
strategy = "wave"
[bot.wave]
grid_levels = 4
refill_threshold = 2
step_bps = 10
inner_steps = 2
chase_to_avg = true

# ─── WLDUSDC ──────────────────────────────────────────────────────────────
# Highest vol (~28% 24h range, ~$21M vol) → highest reward AND highest
# inventory/pile risk. The ±$50 wildcard in backtest (non-determinism +
# volatility). chase_to_avg helps it most; watch closely live.
[[bot]]
symbol = "WLDUSDC"
strategy = "wave"
[bot.wave]
grid_levels = 4
refill_threshold = 2
step_bps = 10
inner_steps = 2
chase_to_avg = true

# ─── SUIUSDC ($5 floor) ───────────────────────────────────────────────────
# ZEC-like vol (~12% range) + strong liquidity (~$19M). Stable ~+41.
[[bot]]
symbol = "SUIUSDC"
strategy = "wave"
[bot.wave]
grid_levels = 4
refill_threshold = 2
step_bps = 10
inner_steps = 2
chase_to_avg = true
