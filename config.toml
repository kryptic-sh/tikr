# ─── Tide USDC majors-only — MAINNET ─────────────────────────────
#
# USDC-margined perpetuals, restricted to bigger crypto markets.
# Uses /fapi/v1/* (same as USDT-M, only quote-asset filter changes).
#
# Why this set?
#   - USDC promo = 0 bps maker (verify at binance.com/en/fee/futureFee).
#     Full min_self_spread_bps becomes net profit per RT.
#   - Majors have the deepest USDC books → fewer adverse-selection
#     surprises than the long-tail USDC perps.
#   - Liquidity ensures fills actually happen (USDC perps are much
#     thinner than USDT equivalents).
#
# Pre-flight:
#   1. TIKR_BINANCE_ENABLE_MAINNET=1
#   2. .env with TIKR_BINANCE_FUTURES_API_KEY / _API_SECRET
#   3. Funded USDC balance in Futures wallet (NOT USDT)
#   4. Confirm USDC maker fee still 0 bps

[account]
env = "futures-mainnet"
state_dir = "./state/tide-usdc-majors"
order_balance_pct = "1"
max_position_pct = "100"
leverage = 5

[tide_auto]
enabled = true
quote_asset = "USDC"

# Allowlist: ONLY these symbols spawn. When set, min_tick_bps +
# min_volume_usdt filters are BYPASSED — operator chose these
# explicitly and min_self_spread_bps below synthesizes the required
# spread regardless of natural book width.
symbols_allowlist = [
  "ETHUSDC",
  "BNBUSDC",
  "SOLUSDC",
  "XRPUSDC",
  "DOGEUSDC",
  "ADAUSDC",
  "AVAXUSDC",
  "LINKUSDC",
  "SUIUSDC",
  "1000PEPEUSDC",
  "1000SHIBUSDC",
  "WIFUSDC",
  "WLDUSDC",
  "ARBUSDC",
]

# Ignored when symbols_allowlist set, but kept for reference if
# you remove the allowlist and want free discovery.
min_tick_bps = "0"
min_volume_usdt = "5000000"

recheck_interval_secs = 60

# 8 bps min spread = ~5 bps net edge at 0-bps-maker promo rates.
# Tighter than USDT config because USDC fee saving lets us be more
# aggressive on the spread.
min_self_spread_bps = 10

# Smaller grid — thinner USDC books mean less safe inventory accumulation.
grid_levels = 3

# 0 = DISABLED. Grid-only mode: filled orders are not paired with
# close orders. Position drains via grid maintenance on the opposite
# side instead. Set > 0 to re-enable close-on-fill at N bps.
close_profit_bps = 0

# Grid spacing in bps of mid (snapped to tick, min 1 tick). Default 4.
# Tight-tick markets like ETHUSDC have tick ≈ 0.005 bps — 1-tick
# spacing piles dozens of orders within sub-bps. 4 bps gives
# meaningful fill independence between levels.
grid_step_bps = 10

# Adaptive bps walk-in/out. When fills-per-minute < 1, tighten
# min_self_spread_bps and grid_step_bps by 1 every 60s (floor 1).
# When fpm >= 1, walk back out to the baseline values above. Default ON.
adaptive_bps_enabled = true
