# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/checks/cfg.html

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "warn"
ignore = [
  # fast-float: empty-input segfault in unsafe pointer deref. Pulled in
  # transitively by polars-arrow -> polars (tikr-backtest replay only).
  # No safe upgrade -- fix lives in the fast-float2 fork; polars has not
  # migrated yet. We never feed untrusted strings to polars's float parser
  # (recorder writes from typed WS payloads, replay reads our own files),
  # so the empty-string path is unreachable. Revisit on polars bump.
  { id = "RUSTSEC-2025-0003", reason = "transitive via polars; empty-input path unreachable from our usage" },
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MPL-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "CC0-1.0",
  # Boost Software License -- OSI-approved, FSF Free/Libre. Pulled in by
  # xxhash-rust (transitive via polars-core).
  "BSL-1.0",
  # Community Data License Agreement -- Permissive 2.0. SPDX-listed,
  # OSI-approved, no copyleft. Pulled in by webpki-roots (transitive via
  # reqwest + tokio-tungstenite for the rustls-tls trust store).
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
