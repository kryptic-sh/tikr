# ─── Tick-Floor Sitter on Binance Futures MAINNET ────────────────────────
#
# Live config testing the new SS `quote_offset_ticks` mode on 4
# wide-tick mainnet perps where book sits at 1-tick spread. Each bot
# posts N ticks OUTSIDE the touches (owns its own level, no queue
# competition).
#
# Pure tick math — NO bps used for placement decisions:
#   - Entry  side: `top.bid − N×tick` / `top.ask + N×tick`
#   - Close  side: max(`avg_entry + M×tick`, touch) for long-close
#                  min(`avg_entry − M×tick`, touch) for short-close
#   - `close_target_ticks = 0` → auto = `quote_offset_ticks + 1`
#     so a symmetric (2N+1)-tick RT is the natural exit
#
# Expected per-RT gross spread (N=offset, M=close_target):
#   off=1, M=2 (auto):  3-tick RT capture
#   off=2, M=3 (auto):  5-tick RT capture
#   Minus 4bps maker fees = realized edge per RT
#
# Active bots (filtered to tick >= 5 bps so 1-tick RT covers fees):
#   ESPORTS  : 19.84 bps tick
#   WIF      :  5.07 bps tick
#   XPL      : 11.14 bps tick
#   FIL      :  9.83 bps tick
#   ARB      :  8.87 bps tick
#   DOT      :  7.82 bps tick
#   OP       :  7.52 bps tick
#   ERA      :  7.20 bps tick
#
# Pre-flight checklist:
#   1. TIKR_BINANCE_ENABLE_MAINNET=1 set in shell
#   2. .env loaded with TIKR_BINANCE_FUTURES_API_KEY / _API_SECRET
#   3. Futures account activated, USDT >= $200 in Futures wallet
#   4. Leverage 1x on all 4 symbols (default may be 20x — change in UI)
#
# Sizing per bot (auto-derived from wallet via account.* percentages):
#   - order_balance_pct = 1.5%   per-order notional
#   - max_position_pct  = 4%     per-bot cap
#
# At $200 wallet across 4 symbols: $3/order, $8 cap/bot = $32 total.
# At $700 wallet:                  $10.50/order, $28 cap/bot = $112 total.
# Adjust pct values if you want bigger exposure.
#
# Adverse stop = safety backstop. Time gate 120s. Drift threshold
# sized per-symbol to ~3-4 ticks (= one fat market move against us).


# ─── Account ───────────────────────────────────────────────────────────────
[account]
env = "futures-mainnet"
state_dir = "./state/tick-floor"

# Credentials: .env auto-loaded by dotenvy, OR shell env vars
# TIKR_BINANCE_FUTURES_API_KEY / _API_SECRET.

order_balance_pct = "1"
max_position_pct = "100"
leverage = 5

# ─── BNB-fee mode (auto-detected) ─────────────────────────────────────────
#
# tikr calls `GET /fapi/v1/feeBurn` at startup and adopts whatever your
# Binance account toggle says — no manual setting here. When ON, tikr:
#   - converts BNB commissions → USDT-equivalent for accurate tracker fees
#   - displays BNB balance + USDT-value in the api-account sidebar
#   - includes BNB-balance delta in the api-net PnL calculation
#   - (optionally) auto-refills BNB when balance drops below threshold
#
# Refill defaults (safe starter values, override if needed):
#   bnb_min_balance_usdt    = "1"      # refill trigger ($)
#   bnb_target_balance_usdt = "50"     # buy enough to reach this ($)
#   bnb_refill_enabled      = true     # auto-buy on spot + transfer
#
# When feeBurn is OFF on the Binance account, ALL BNB settings are
# ignored: fees stay in USDT, no refill, no BNB row in TUI.


# ─── ESPORTSUSDT ──────────────────────────────────────────────────────────
#
# Tick = 19.84 bps of price (post-crash). 3-tick RT = ~60bps gross.
# Adverse stop at 50bps = ~2.5 ticks → fires on any meaningful drift.
# CAVEAT: token nuked -93% in 24h; adverse selection extreme right
# now. Test with tiny notional first. May need to wait 24-48h for
# vol to settle before stable edge.

[[bot]]
symbol = "ESPORTSUSDT"
strategy = "spread-scalp"

[bot.spread_scalp]
min_spread_bps = 0
quote_offset_ticks = 0          # 1 tick outside touch (avoids -5022)
close_target_ticks = 1          # close at avg ± 1 tick (1-tick RT min)
requote_interval_ms = 5000
reject_cooldown_ms = 250
price_tolerance_ticks = 0
close_side_always_quotes = true

# # Adverse stop scaled to symbol tick.
# adverse_stop_after_secs = 120
# adverse_stop_drift_bps = 50   # ~2.5 ticks at 20bps/tick


