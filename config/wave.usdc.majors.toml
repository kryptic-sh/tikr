# ─── Wave on USDC majors — MAINNET ────────────────────────────────────────
#
# 4 bots: SOLUSDC, ZECUSDC, DOGEUSDC, BNBUSDC. Wave = frozen lattice +
# round-trip refill (refill only when BOTH sides drain ≥ refill_threshold
# slots = a completed bid+ask round-trip). USDC promo (0 bps maker).
#
# Tuned via 2h fixed-step sweep (2026-05-28): inner 0 bps / step 1 bps /
# levels 10 / refill_threshold 5 was the top net AND best risk-adjusted of
# 12 configs — ex-BTC +$5.39/2h, all 4 markets green. Key findings:
#   - Edge lives in STEP width, not inner. Keep inner (min_self_spread) at 0
#     so origins sit at top-of-book; widening it just starves fills.
#   - refill_threshold ≈ levels/2 is the all-green sweet spot. Lower (rt1) =
#     directional gamble + runaway inventory; higher batches deeper.
#   - Tight 1bps step is safe ONLY under the round-trip threshold (rt5);
#     rt1 at the same step blows inventory to $500+.
#   - Fixed bps step, no ATR/recenter/skew (that machinery was deleted).
#
# BTC EXCLUDED: 0.001 BTC lot ≈ $100/order, peaks ~$3k inventory — exceeds a
# $600 @ 5x account's capacity. Do not add BTCUSDC here.
#
# RISK ($600 @ 5x): worst per-market inventory peak in backtest ~$631 (at
# $10/order) → ~$126 margin; a ~19% adverse move ≈ $120 loss. wave has NO
# position cap and keeps adding into a trend — watch a sustained one-way
# move. Size orders so summed peaks stay well under buying power.
#
# Pre-flight:
#   1. TIKR_BINANCE_ENABLE_MAINNET=1
#   2. .env with TIKR_BINANCE_FUTURES_API_KEY / _API_SECRET
#   3. Funded USDC balance in Futures wallet
#   4. Confirm USDC maker fee still 0 bps at binance.com/en/fee/futureFee

[account]
env = "futures-mainnet"
state_dir = "./state/wave-usdc-majors"
asset = "USDC"
order_balance_pct = "1"
max_position_pct = "100"
leverage = 5

# ─── SOLUSDC ($5 floor) ───────────────────────────────────────────────────
[[bot]]
symbol = "SOLUSDC"
strategy = "wave"
[bot.wave]
grid_levels = 10
refill_threshold = 5
min_self_spread_bps = 1
grid_step_bps = 2

# ─── ZECUSDC ($5 floor) ───────────────────────────────────────────────────
# Swapped in for ETHUSDC (ETH min notional ~$20 on USDC perps, too large for
# this account). NOT backtested — no 2h ZEC data; running on the winning
# params unvalidated, watch first live session.
[[bot]]
symbol = "ZECUSDC"
strategy = "wave"
[bot.wave]
grid_levels = 10
refill_threshold = 5
min_self_spread_bps = 1
grid_step_bps = 2

# ─── DOGEUSDC ─────────────────────────────────────────────────────────────
[[bot]]
symbol = "DOGEUSDC"
strategy = "wave"
[bot.wave]
grid_levels = 10
refill_threshold = 5
min_self_spread_bps = 1
grid_step_bps = 2

