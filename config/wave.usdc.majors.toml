# ─── Wave on USDC majors — MAINNET ────────────────────────────────────────
#
# 4 bots: BTCUSDC, ETHUSDC, DOGEUSDC, ZECUSDC. Wave strategy = frozen
# lattice + lazy recenter on inner-drain. Adaptive ATR step. USDC promo
# (0 bps maker).
#
# Tuned from 2h ETHUSDT sweep (2026-05-28): 1-second bars + atr_period=120
# + step_atr_mult=8 was the top net (+$1.60 vs +$0.62 for 1m/atr14/mult0.5),
# and warms up in ~2 min instead of ~15 min. atr_mult must scale ~8× on
# 1s bars because per-bar ATR shrinks ~√(60) vs 1m bars. drain=2 +
# cooldown=1000ms is safe (cooldown prevents the tight-grid recenter
# cascade that blew inventory to $810k without it).
#
# NOTE: warmup is event-driven (a 1s bar only closes when an event lands
# in a new second). On quiet symbols (ZEC/DOGE) real warmup may exceed
# 120s. Keep atr_period ≤ 120 on 1s bars — atr_period=300 never warmed
# up in the 2h test.
#
# Key behavior:
#   - Init: wait ~120 closed 1s bars → seed lattice at ATR × 8 step
#   - Each event: do nothing unless ≥ 2 of 12 slots drained one side
#   - Recenter (≥1s since last): emit missing slots on skewed window
#   - Every 10 recenters: recompute ATR + step, re-anchor lattice
#   - Never cancel — old orders rest forever (queue priority preserved)
#
# Pre-flight:
#   1. TIKR_BINANCE_ENABLE_MAINNET=1
#   2. .env with TIKR_BINANCE_FUTURES_API_KEY / _API_SECRET
#   3. Funded USDC balance in Futures wallet
#   4. Confirm USDC maker fee still 0 bps at binance.com/en/fee/futureFee

[account]
env = "futures-mainnet"
state_dir = "./state/wave-usdc-majors"
asset = "USDC"
order_balance_pct = "1"
max_position_pct = "100"
leverage = 5

# ─── SOLUSDC ($5 floor) ───────────────────────────────────────────────────
[[bot]]
symbol = "SOLUSDC"
strategy = "wave"
[bot.wave]
grid_levels = 4
recenter_drain_slots = 1
skew_max_pct = "0.25"
bar_interval_secs = 1
atr_period = 120
step_atr_mult = "8.0"
bar_warmup_bars = 120
relattice_every_n_recenters = 5
recenter_cooldown_ms = 1000

