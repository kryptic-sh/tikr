# ─── Joker on mixed USDC + USDT majors — MAINNET ──────────────────────────
#
# 4 bots running the Joker strategy: join touch on every event, dedupe
# by exact same-side same-price match, never cancel. No close-on-fill,
# no grid, no inventory cap inside the strategy.
#
# Best suited to USDC promo (0 bps maker) where any fill at touch
# captures pure spread with no cost floor. USDT bots pay 2 bps maker.
#
# Pre-flight:
#   1. TIKR_BINANCE_ENABLE_MAINNET=1
#   2. .env with TIKR_BINANCE_FUTURES_API_KEY / _API_SECRET
#   3. Funded USDC AND USDT balance in Futures wallet (mixed)

[account]
env = "futures-mainnet"
state_dir = "./state/joker"
asset = "USDC"
order_balance_pct = "1"
max_position_pct = "100"
leverage = 5

# ─── ETHUSDC (USDC promo, 0 bps maker) ─────────────────────────────────────
[[bot]]
symbol = "ETHUSDC"
strategy = "joker"
[bot.joker]
max_order_age_secs = 10
order_tick_offset = 1
order_tick_tolerance = 5

# ─── ZECUSDC (USDC promo, 0 bps maker, wide-tick) ──────────────────────────
[[bot]]
symbol = "ZECUSDC"
strategy = "joker"
[bot.joker]
max_order_age_secs = 10
order_tick_offset = 1
order_tick_tolerance = 5

# ─── BNBUSDT (USDT tier-0, 2 bps maker) ────────────────────────────────────
[[bot]]
symbol = "BNBUSDT"
strategy = "joker"
[bot.joker]
max_order_age_secs = 10
order_tick_offset = 1
order_tick_tolerance = 5

# ─── DOGEUSDT (USDT tier-0, 2 bps maker) ───────────────────────────────────
[[bot]]
symbol = "DOGEUSDT"
strategy = "joker"
[bot.joker]
max_order_age_secs = 10
order_tick_offset = 1
order_tick_tolerance = 5
