# ─── Tide ETHUSDC bps-mode — MAINNET ───────────────────────────────────────
#
# Migrated from tick-override mode (removed 2026-05-28). Tick values converted
# to bps using ETHUSDC tick_size=0.01, price≈$2500:
#   min_self_spread_ticks=50 → 50 × 0.01 / 2500 × 10000 = 2 bps
#   grid_step_ticks=50       → 2 bps
#   close_profit_ticks=80    → removed (Rule 2 / close-on-fill removed)
#   adaptive_bps_enabled     → removed (adaptive bps removed)
#
# ETHUSDC tick_size = 0.01 USD.
#   inner = 2 bps ≈ 5 ticks at $2500
#   step  = 2 bps ≈ 5 ticks at $2500
#   levels = 1 per side
#
# USDC promo (0 bps maker) — any rebound after a fill prints PnL.
#
# Pre-flight:
#   1. TIKR_BINANCE_ENABLE_MAINNET=1
#   2. .env with TIKR_BINANCE_FUTURES_API_KEY / _API_SECRET
#   3. Funded USDC balance in Futures wallet

[account]
env = "futures-mainnet"
state_dir = "./state/tide-ethusdc-ticks"
asset = "USDC"
order_balance_pct = "1"
max_position_pct = "100"
leverage = 5

[[bot]]
symbol = "ETHUSDC"
strategy = "tide"
[bot.tide]
grid_levels = 1
step_bps = 2
prune_stragglers = false

[[bot]]
symbol = "ZECUSDC"
strategy = "tide"
[bot.tide]
grid_levels = 1
step_bps = 2
prune_stragglers = false
