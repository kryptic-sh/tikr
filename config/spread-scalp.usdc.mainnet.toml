# ─── SpreadScalp on USDC majors — MAINNET ──────────────────────────────────
#
# 11 fixed bots — knob set copied from `config/spread-scalp.majors.toml`
# (testnet winner). Per its header note, mainnet majors spread is 0.5-2 bps
# vs testnet's 5-20, so min_spread_bps below WILL gate most of the time on
# tight markets — accepting low fill rate to avoid adverse-selection drag.
#
# Removed: take_profit_bps, stop_loss_bps, adverse_window_ms (EMA),
# strict_touch_quotes. A/B testing showed TP/SL/adverse-EMA flipped
# sign-negative. Time+drift adverse-stop replaces the EMA tracker.
#
# Pre-flight:
#   1. TIKR_BINANCE_ENABLE_MAINNET=1
#   2. .env with TIKR_BINANCE_FUTURES_API_KEY / _API_SECRET
#   3. Funded USDC balance in Futures wallet
#   4. Confirm USDC maker fee still 0 bps at binance.com/en/fee/futureFee

[account]
env = "futures-mainnet"
state_dir = "./state/spread-scalp-usdc"
asset = "USDC"
order_balance_pct = "1"
max_position_pct = "100"
leverage = 5

# ─── BTCUSDC ───────────────────────────────────────────────────────────────
[[bot]]
symbol = "BTCUSDC"
strategy = "spread-scalp"
[bot.spread_scalp]
notional = 120
min_spread_bps = 5
requote_interval_ms = 500
max_position_usdt = 200
reject_cooldown_ms = 500
price_tolerance_ticks = 1
adverse_stop_after_secs = 120
adverse_stop_drift_bps = 30
close_side_always_quotes = true

