# ─── SpreadScalp on USDC majors — MAINNET ──────────────────────────────────
#
# 15 fixed bots — same symbol list as the main config.toml USDC allowlist.
# USDC promo (0 bps maker) — no fee floor → min_spread_bps = 0.
#
# Pre-flight:
#   1. TIKR_BINANCE_ENABLE_MAINNET=1
#   2. .env with TIKR_BINANCE_FUTURES_API_KEY / _API_SECRET
#   3. Funded USDC balance in Futures wallet
#   4. Confirm USDC maker fee still 0 bps at binance.com/en/fee/futureFee

[account]
env = "futures-mainnet"
state_dir = "./state/spread-scalp-usdc"
asset = "USDC"
# 0.5% per order × 15 bots = 7.5% per round trip if all fire at once.
order_balance_pct = "0.5"
# Per-bot peak-position cap = 100% wallet / bot_count (auto-split).
max_position_pct = "100"
leverage = 5

# ─── BTCUSDC ───────────────────────────────────────────────────────────────
[[bot]]
symbol = "BTCUSDC"
strategy = "spread-scalp"
[bot.spread_scalp]
min_spread_bps = 0
requote_interval_ms = 500
reject_cooldown_ms = 500
price_tolerance_ticks = 1
take_profit_bps = 5
stop_loss_bps = 30
close_side_always_quotes = true
adverse_window_ms = 60000
adverse_half_life_fills = 20
adverse_threshold_bps = "2"
adverse_max_widen_bps = 10

