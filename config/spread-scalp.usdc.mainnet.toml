# ─── SpreadScalp on USDC majors — MAINNET ──────────────────────────────────
#
# 14 fixed bots — same symbol list as config/tide.usdc.mainnet.toml.
#
# USDC-specific overrides:
#   min_spread_bps    = 0   (USDC promo = 0 maker fee, no fee floor)
#   quote_offset_ticks = 0  (USDC majors run 1-tick books; legacy
#                            inside-touch quoting would cross)
#
# Pre-flight:
#   1. TIKR_BINANCE_ENABLE_MAINNET=1
#   2. .env with TIKR_BINANCE_FUTURES_API_KEY / _API_SECRET
#   3. Funded USDC balance in Futures wallet
#   4. Confirm USDC maker fee still 0 bps at binance.com/en/fee/futureFee

[account]
env = "futures-mainnet"
state_dir = "./state/spread-scalp-usdc"
asset = "USDC"
order_balance_pct = "0.5"
max_position_pct = "100"
leverage = 5


# ─── BTCUSDC ───────────────────────────────────────────────────────────────
[[bot]]
symbol = "BTCUSDC"
strategy = "spread-scalp"
[bot.spread_scalp]
min_spread_bps = 0
quote_offset_ticks = 0
close_target_ticks = 1
requote_interval_ms = 500
reject_cooldown_ms = 500
price_tolerance_ticks = 1
adverse_stop_after_secs = 120
adverse_stop_drift_bps = 30


