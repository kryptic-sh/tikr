# SpreadScalp on the major-cap pairs currently active in `config.toml`
# (BTC, ETH, BNB, SOL, DOGE). Fixed-symbol layout — no rotation — so the
# strategy can build up symbol-specific state.
#
# Run with:
#   tikr --config ./config/spread-scalp.majors.toml
#
# ─── Testnet vs mainnet ────────────────────────────────────────────────────
# This file is tuned for `futures-testnet` where the spread on majors is
# routinely 5-20 bps (thin book, sparse MMs), so the 5-8 bps
# `min_spread_bps` thresholds below fire often enough to be useful.
#
# On mainnet majors spread sits at 0.5-2 bps and these thresholds give
# near-zero fills (verified against 24h recordings 2026-05-22..23).
# Lower min_spread to 2-3 to actually trade on mainnet — but adverse
# selection eats the captured spread. Honest mainnet recipe: gate on a
# liq-cascade event instead (see `LiqFade` strategy).
#
# ─── Fees ──────────────────────────────────────────────────────────────────
# Binance Futures USD-M tier 0: 2 bps maker / 5 bps taker = 4 bps maker
# round-trip. `min_spread_bps` is set above this floor so accepted fills
# clear fees with some captured spread.
#
# ─── Active knobs ──────────────────────────────────────────────────────────
# Each [bot.spread_scalp] block sets:
#   notional, min_spread_bps, requote_interval_ms,
#   max_position_usdt, reject_cooldown_ms, price_tolerance_ticks,
#   adverse_stop_after_secs, adverse_stop_drift_bps
#
# TP/SL and adverse-tracker (entry-side widen) fields stay OFF — the
# 2026-05-22 ETH/DOGE live A/B showed both flipped sign-negative.
#
# Adverse-drift HARD STOP (new 2026-05-25) is ON at 120s / 30bps —
# DOGE backtest 33h sweep showed +93% banked profit vs unstopped
# baseline. Distinct from the cancelled-out IOC-on-loss closer: this
# fires only after a long hold + meaningful drift, so winners aren't
# touched. Defaults reference at the bottom lists every available knob.

# ─── Account ───────────────────────────────────────────────────────────────
[account]
env = "futures-testnet"
state_dir = "./state"

# 1% of margin balance split across 5 bots = 0.2% per bot per order.
# Per-bot strategy `notional` below overrides this when set explicitly.
order_balance_pct = "1"

# key_file = "./keys/binance-testnet.txt"


# ─── BTCUSDT ───────────────────────────────────────────────────────────────
#
# Mainnet spread 0.5-1 bps → near-zero fills at min_spread=5; testnet
# spread 5-15 bps → frequent fills. **No TP / no SL** — the natural
# opposite-side maker quote closes the position at 2 bps maker fee
# instead of paying taker (5 bps) via an IOC close, and the live A/B
# showed the IOC closer net-negative. `max_position_usdt` caps inventory
# at ~1-2 fills' worth so a bad fill can't grind unbounded.

[[bot]]
symbol = "BTCUSDT"
strategy = "spread-scalp"

[bot.spread_scalp]
notional = 120
min_spread_bps = 5
requote_interval_ms = 500
max_position_usdt = 200
reject_cooldown_ms = 500
price_tolerance_ticks = 1
adverse_stop_after_secs = 120
adverse_stop_drift_bps = 30


