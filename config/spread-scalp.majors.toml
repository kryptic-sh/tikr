# ─── DOGEUSDT ──────────────────────────────────────────────────────────────
#
# Mainnet native spread 1-2 bps; testnet spread 5-15 bps. Bumped
# `min_spread_bps=8` (vs 5/6 for the rest of the basket) because DOGE
# sees the heaviest toxic flow on testnet — wider entry threshold filters
# out the worst adverse selection. Most active bot in the basket on
# testnet; mainnet-side near-silent at this threshold (see header note).

[[bot]]
symbol = "DOGEUSDT"
strategy = "spread-scalp"

[bot.spread_scalp]
notional = 120
min_spread_bps = 8
requote_interval_ms = 500
max_position_usdt = 200
reject_cooldown_ms = 500
price_tolerance_ticks = 1
adverse_stop_after_secs = 120
adverse_stop_drift_bps = 30


# ─── Defaults reference ───────────────────────────────────────────────────
# tick_size                = "0.0001"  # auto-detected from exchangeInfo
# notional                 = 25        # fiat $ per order
# min_spread_bps           = 5         # minimum market spread to quote
# requote_interval_ms      = 1000      # fixed requote interval
# max_position_usdt        = 0         # 0 = uncapped (uses balance × leverage)
# take_profit_usdt         = 0         # legacy abs USDT; falls back when bps == 0
# take_profit_bps          = 0         # bps of position notional (preferred)
# stop_loss_bps            = 0         # bps of position notional
# reject_cooldown_ms       = 2000      # 0 = no per-side cooldown
# price_tolerance_ticks    = 1         # 0 = exact match required
# adverse_window_ms        = 0         # 0 = adverse tracker disabled
# adverse_half_life_fills  = 10
# adverse_threshold_bps    = "3"
# adverse_max_widen_bps    = 10
