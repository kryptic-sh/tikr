# ─── Tide on USDC majors ───────────────────────────────────────────────────
#
# 4 bots: NEARUSDC, ZECUSDC, WLDUSDC, SUIUSDC — same lineup as config.toml.
# Tide = frozen one-sided lattice + chase_to_avg on the reducing side. step_bps
# does DOUBLE duty: the level spacing AND (× inner_steps) the dead-zone around
# mid. grid_levels = resting depth per side. USDC promo (0 bps maker).
# Account: $1000 @ 5x, order 0.5% ($5/order), max_position_pct 70%, boost off.
#
# Tuned 2026-05-30 on data/72h (NEAR/ZEC/WLD/SUI, a trending slice), pinned
# 76/27ms latency, 0 bps maker, $1000 @ 5x, order 0.5%, boost 0:
#   step=30 / inner=2 / lv=5 / chase_to_avg / max_pos 70%
#   sum NET +121.65   NEAR +11.15   SUI +21.93   WLD +66.23   ZEC +22.20
#   peaks 699–930 (target ~$900). Profitable on all 4.
#
# Why these knobs:
#  • step=30bps is the profit peak — step<20 churns/bleeds (step=2 → −14 total);
#    step>30 trims edge (35 → +113, 40 → +97).
#  • inner_steps=2 (60bps dead-zone) is what fixed NEAR: it stops the grid
#    over-accumulating the losing long in a down-trend (NEAR −14 → +11).
#  • boost=0 beats boost=25 here (de-risker that cuts edge in ranging regimes).
#  • max_position_pct=70 is the PEAK control, NOT geometry. For a trending
#    symbol the grid loads right up to the cap regardless of step/inner/levels
#    (verified: at max_pos=100 NEAR/ZEC peak 1050–1185 in EVERY combo). The cap
#    × ~1.2–1.3 mark-overshoot ⇒ ~$900 peak. Raise the cap and the peak runs.
#
# ⚠ This was a TRENDING window. Validate on a RANGING slice before a long
# mainnet session — frozen grids behave differently across regimes.
#
# Pre-flight (mainnet): TIKR_BINANCE_ENABLE_MAINNET=1; .env keys; funded USDC;
# confirm 0 bps maker still live.

[account]
env = "futures-mainnet"
asset = "USDC"
order_balance_pct = "0.5"
max_position_pct = "70"
leverage = 5
inventory_boost_pct = "0"
inventory_boost_curve = "1"

# ─── NEARUSDC ─────────────────────────────────────────────────────────────
[[bot]]
symbol = "NEARUSDC"
strategy = "tide"
[bot.tide]
grid_levels = 5
step_bps = 30
inner_steps = 2
prune_stragglers = true
chase_to_avg = true

