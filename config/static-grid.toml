# ─── Account ───────────────────────────────────────────────────────────────
[account]
env = "futures-testnet"

# Rampage auto-rotation (migrated from [static_grid_rotation]): runs the
# static-grid [[bot]] template on the top `top_n` symbols by realized_vol − fee.
[rampage]
enabled = true
top_n = 4
recheck_interval_secs = 3600
quote_asset = "USDT"
min_volume_usdt = "50000000"

[rampage.score]
mode = "realized_vol"
[rampage.score.params]
min_tick_bps = "0"

[rampage.strategy]
kind = "template"
[rampage.strategy.params]
name = "static-grid"

# StaticGrid template. Rotation copies these params onto each selected symbol.
[[bot]]
symbol = "HYPERUSDT"
strategy = "static-grid"
[bot.sg]
levels = 3
step_bps = 6
inner_bps = 12
