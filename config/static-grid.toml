# ─── Account ───────────────────────────────────────────────────────────────
[account]
env = "futures-testnet"

# StaticGrid rotation: keep 3 bots on the most volatile USDT futures
# markets, using the static-grid strategy.
[static_grid_rotation]
enabled = true
strategy = "static-grid"
slots = 4
refresh_secs = 3600
quote_asset = "USDT"
min_quote_volume = 50000000

# StaticGrid template. Rotation copies these params onto each selected symbol.
[[bot]]
symbol = "HYPERUSDT"
strategy = "static-grid"
[bot.sg]
levels = 3
step_bps = 6
inner_bps = 12
