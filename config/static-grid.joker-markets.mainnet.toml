# ─── StaticGrid on Joker markets — MAINNET ────────────────────────────────
#
# 4 bots, same symbol basket as `config/joker.mainnet.toml`. StaticGrid
# = batched ladder per side; rebuilds only when consumed. Compare PnL
# head-to-head against Joker on the same symbols to learn which
# strategy fits each book.
#
# Knobs picked to mirror the joker geometry: inner=1bps, step=5bps,
# levels=3 per side → similar resting band as a 5-tick-tolerance joker.
#
# Pre-flight:
#   1. TIKR_BINANCE_ENABLE_MAINNET=1
#   2. .env with TIKR_BINANCE_FUTURES_API_KEY / _API_SECRET
#   3. Funded USDC + USDC balance in Futures wallet

[account]
env = "futures-mainnet"
state_dir = "./state/sg-joker-markets"
asset = "USDC"
order_balance_pct = "1"
max_position_pct = "100"
leverage = 5

# ─── ETHUSDC (USDC promo, 0 bps maker) ─────────────────────────────────────
[[bot]]
symbol = "ETHUSDC"
strategy = "static-grid"
[bot.sg]
levels = 2
inner_bps = 3
step_bps = 1

# ─── ZECUSDC (USDC promo, 0 bps maker, wide-tick) ──────────────────────────
[[bot]]
symbol = "ZECUSDC"
strategy = "static-grid"
[bot.sg]
levels = 2
inner_bps = 3
step_bps = 1

# ─── BNBUSDC (USDC tier-0, 2 bps maker) ────────────────────────────────────
[[bot]]
symbol = "BNBUSDC"
strategy = "static-grid"
[bot.sg]
levels = 2
inner_bps = 3
step_bps = 1

# ─── DOGEUSDC (USDC tier-0, 2 bps maker) ───────────────────────────────────
[[bot]]
symbol = "DOGEUSDC"
strategy = "static-grid"
[bot.sg]
levels = 2
inner_bps = 3
step_bps = 1
