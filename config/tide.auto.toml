# ─── Rampage AUTO-rotation (TIDE) — MAINNET ────────────────────────────────
#
# Same discovery + rotation as the default config.toml, but each spawned bot
# runs the TIDE strategy instead of Wave. No fixed bot list — the [rampage]
# manager scores every liquid USD-M perp and runs Tide on the top N, re-ranking
# every recheck.
#
# Tide vs Wave: Wave is a frozen fixed-step lattice + round-trip refill; Tide is
# a FILL-DRIVEN SLIDING lattice — the grid re-centers one step per net fill
# (add-near / cancel-far), keeping a tight inner spread and accumulating toward
# the cap on a trend. Tighter touch than Wave → typically more fills.
#
# Score mode: candle_height (kept identical to the default config so the two run
# on the SAME market selection — average height of the last `candle_count` 1m
# candles, as a percent). Swap to "tick_bps" if you'd rather rank Tide by the
# tick/price ratio (its classic signal); see [rampage.score] below.
#
# Each recheck: list perps + price + 24h volume (cheap), pre-filter by
# `min_volume_usdt`, then fetch the last `candle_count` 1m klines for each
# survivor (concurrent), score, and run Tide on the top `top_n`.
#
# Rotation is graceful: a symbol that drops out only rotates when its bot NET
# (realized + unrealized − fees) is green, OR the NET loss is within
# `rotate_loss_pct` of total wallet. A bigger loss keeps the bot running
# (defer_underwater, default on) until it recovers.
#
# WHY USDT: the volatile small-cap oscillators live on USDT perps; USDC perps
# are mostly the tight majors. Discovery scans USDT, so the futures wallet needs
# USDT margin.
#
# ⚠ Live, real money. Tide slides + accumulates into a trend up to the cap; the
# defer-underwater guard is the backstop. Watch the first sessions; size so
# summed peaks stay under buying power.
#
# Pre-flight (mainnet): TIKR_BINANCE_ENABLE_MAINNET=1; .env keys; funded USDT
# in the Futures wallet; confirm maker fee at binance.com/en/fee/futureFee.
#
# Run: tikr --config config.tide.auto.toml

[account]
env = "futures-mainnet"
asset = "USDT"
order_balance_pct = "0.1"
max_position_pct = "0"
leverage = 10
inventory_boost_pct = "0"
inventory_boost_curve = "1"

[rampage]
enabled = true
min_volume_usdt = "2000000" # $2M 24h quote volume floor
recheck_interval_secs = 60
quote_asset = "USDT"
top_n = 10
# defer_underwater defaults true (don't rotate a bot holding a losing bag)
rotate_loss_pct = "1" # accept NET loss up to 1% of wallet on rotate (NET = realized+unrealized−fees)

[rampage.score]
mode = "candle_height" # "candle_height" (Wave signal) | "tick_bps" (Tide signal)
[rampage.score.params]
candle_count = 60    # average the last 60 one-minute candles (~1h window)
min_candle_pct = "0" # min avg candle height % to qualify (0 = no floor)

[rampage.strategy]
kind = "tide" # "wave" | "tide"
[rampage.strategy.params]
grid_levels = 10
step_bps = 30           # step30 inner2 = best uncapped Tide in backtest (peak ~$500, net+)
inner_steps = 1         # empty dead zone: mid + inner_steps slots each side (5 vacant); innermost order (inner_steps+1) steps from center
chase_to_avg = false
prune_stragglers = true # trim both edges so the ladder stays grid_levels wide (default on)
