# ─── MicroMeanReversion on USDC majors — MAINNET ──────────────────────────
#
# 4 bots: NEARUSDC, ZECUSDC, WLDUSDC, SUIUSDC — same lineup as the Wave
# config.toml. MMR fades short-term dislocations: when a trade prints
# `trigger_bps` from mid, post a passive entry `entry_bps` from mid on the
# opposite side, then take profit `exit_bps` from the fill. USDC promo
# (0 bps maker).
#
# Account mirrors config.toml: $600 @ 5x, order_balance_pct 1 (~$6/order),
# max_position_pct 100, inventory boost off.
#
# Params (trigger 12 / entry 2 / exit 8 / max_open 1) are the values used in
# the 4-symbol frozen-data backtest (72h frozen, 76/27ms latency). On that
# window MMR netted +53.75 across the four with the iter4 risk machinery:
#   NEAR +1.47  SUI +11.69  WLD +9.53  ZEC +31.05
# vs +18.82 for the bare hold-to-TP baseline. Single-window result — treat as
# directional, not precise; watch the first live sessions.
#
# Risk machinery — the iter4 winner, pinned explicit on every bot so the
# config can't drift if code defaults change:
#   confirm_touch    = true enter only when the trade prints through the touch
#   tp_relax_trigger = 20   relax TP toward break-even past 20bps adverse …
#   tp_relax_floor   = 3    … to avg_entry + 3bps, maker-safe, never crossing
#   add_block_bps    = 15   suppress same-side adds once 15bps adverse
# (The losing-iter knobs — IOC stop-loss, net cap, skew, IOC give-up, size
# scaling — were removed from the strategy entirely; they only ever hurt.)
#
# Pre-flight (identical to config.toml):
#   1. TIKR_BINANCE_ENABLE_MAINNET=1
#   2. .env with TIKR_BINANCE_FUTURES_API_KEY / _API_SECRET
#   3. Funded USDC balance in Futures wallet
#   4. Confirm USDC maker fee still 0 bps at binance.com/en/fee/futureFee

[account]
env = "futures-mainnet"
state_dir = "./state/mmr-usdc-majors"
asset = "USDC"
order_balance_pct = "1"
max_position_pct = "100"
leverage = 5
inventory_boost_pct = "0"
inventory_boost_curve = "1"

# ─── NEARUSDC ─────────────────────────────────────────────────────────────
[[bot]]
symbol = "NEARUSDC"
strategy = "micro-mean-reversion"
[bot.micro_mean_reversion]
trigger_bps = 12
entry_bps = 2
exit_bps = 8
max_open_entries = 1
confirm_touch = true
tp_relax_trigger_bps = 20
tp_relax_floor_bps = 3
add_block_bps = 15

