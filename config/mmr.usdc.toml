# ─── MicroMeanReversion on USDC majors ────────────────────────────────────
#
# 4 bots: NEARUSDC, ZECUSDC, WLDUSDC, SUIUSDC — same lineup as the Wave
# config.toml. MMR fades short-term dislocations: when a trade prints
# `trigger_bps` from mid, post a passive entry `entry_bps` from mid on the
# opposite side, then take profit `exit_bps` from the fill. USDC promo
# (0 bps maker).
#
# Account mirrors config.toml: $600 @ 5x, order_balance_pct 1 (~$6/order),
# max_position_pct 100, inventory boost off.
#
# ⚠ THIN EDGE / SHORT WINDOW — WATCH THE FIRST MAINNET SESSION ⚠
# BARE snapback + velocity cooldown. The iter4 "improvement" machinery
# (confirm_touch / tp_relax / add_block) is OFF — it backtested as a net LOSER
# (+3.71) once FillSim was made faithful to the real Binance -5022 post-only
# reject; the bare strategy is the winner.
#
# Honest backtest (4 symbols, ONLY ~13.07h of frozen data each, 76/27ms
# latency, faithful -5022 reject, $600 @ 5x, entry_cooldown 1000ms):
#   sum NET +19.53   NEAR +15.40   SUI +0.15   WLD +2.55   ZEC +1.43
#   peak inventory ≤ ~$324   peak fills/min ≤ ~7 (cooldown caps the burst)
# Bare WITHOUT the cooldown is +31.47 but pins inventory at the $600 cap and
# bursts to ~117 fills/min — that is the profile that blew up live, so we keep
# the cooldown. CAVEATS: 13h is a tiny window that happened to REVERT; a
# trending month can look very different (the same symbols ran -297 in an
# earlier iter), and ~94% of this NET is NEAR alone. Treat as directional only.
#
# Strategy params: trigger 12 / entry 2 / exit 8 / max_open 1 (bare snapback).
# Live-safety = the velocity cooldown (the non-redundant lever; the runner's
# two-layer position cap already bounds total inventory, so no net cap here):
#   entry_cooldown_ms = 1000   ≥1s between same-side entries. Caps entry burst
#                              rate (max_open_entries only caps RESTING quotes,
#                              useless for fill-on-contact entries). Also gates
#                              the -5022 requote so a cross can't reject-storm.
# (Losing knobs — IOC stop-loss, net cap, skew, IOC give-up, size scaling,
# confirm_touch/tp_relax/add_block — all off or removed; none helped.)
#
# Pre-flight (mainnet):
#   1. TIKR_BINANCE_ENABLE_MAINNET=1
#   2. .env with TIKR_BINANCE_FUTURES_API_KEY / _API_SECRET
#   3. Funded USDC balance in Futures wallet
#   4. Confirm USDC maker fee still 0 bps at binance.com/en/fee/futureFee
#   5. WATCH the first session, do not leave unattended, and stop on the first
#      sign of sustained one-sided inventory piling (a trending regime).

[account]
env = "futures-mainnet"
state_dir = "./state/mmr-usdc-majors"
asset = "USDC"
order_balance_pct = "1"
max_position_pct = "100"
leverage = 5
inventory_boost_pct = "0"
inventory_boost_curve = "1"

# ─── NEARUSDC ─────────────────────────────────────────────────────────────
[[bot]]
symbol = "NEARUSDC"
strategy = "micro-mean-reversion"
[bot.micro_mean_reversion]
trigger_bps = 12
entry_bps = 2
exit_bps = 8
max_open_entries = 1
confirm_touch = false
tp_relax_trigger_bps = 0
tp_relax_floor_bps = 0
add_block_bps = 0
entry_cooldown_ms = 1000

