# ─── MicroMeanReversion on USDC majors ────────────────────────────────────
#
# 4 bots: NEARUSDC, ZECUSDC, WLDUSDC, SUIUSDC — same lineup as the Wave
# config.toml. MMR fades short-term dislocations: when a trade prints
# `trigger_bps` from mid, post a passive entry `entry_bps` from mid on the
# opposite side, then take profit `exit_bps` from the fill. USDC promo
# (0 bps maker).
#
# Account mirrors config.toml: $600 @ 5x, order_balance_pct 1 (~$6/order),
# max_position_pct 100, inventory boost off.
#
# ⚠ TUNED ON A SHORT WINDOW — WATCH THE FIRST MAINNET SESSION ⚠
# BARE snapback + velocity cooldown, geometry tuned by grid sweep. The iter4
# machinery (confirm_touch / tp_relax / add_block) is OFF — it backtested as a
# net LOSER once FillSim emitted the real Binance -5022 reject; the bare
# strategy is the winner. Tighter trigger (3bps) captures the small
# dislocations and balances profit across all four symbols (no longer
# NEAR-carried).
#
# Backtest (4 symbols, ONLY ~13.07h frozen each, 76/27ms latency, faithful
# -5022 reject, $600 @ 5x, cooldown 500ms, tp 6bps, max_position_pct 80):
#   sum NET +72.13   NEAR +13.92   SUI +9.28   WLD +27.62   ZEC +21.31
#   peak inventory ≤ ~$495   peak fills/min ≤ ~24
# tp×cooldown sweep picked cd=500/tp=6 (+72.13) over cd=1000/tp=10 (+57.39):
# a shorter 500ms cooldown captures more fills (2 entries/sec/side ceiling vs
# 1/sec) and the tight 6bps TP banks more round-trips. max_position_pct sweep
# (risk/return knee): 100%→+61/$627, 80%→+57/$499, 50%→+35/$310, 30%→+17/$185
# (all all-symbol-positive). 80% is the best return-on-inventory; drop to 50%
# for a more conservative first run.
#
# ⚠ REJECT RATE ~34%: a third of orders cross the moving book and get -5022
# rejected even in sim — so LIVE you will see constant -5022 warnings and fills
# arrive slowly/lumpily. That is EXPECTED for a tight-trigger maker, not a bug;
# the drop-on-5022 + cooldown keep it from storming. Be patient for fills.
#
# CAVEATS: 13h is a tiny window that happened to REVERT; a trending stretch can
# look very different (the same symbols ran -297 in an earlier iter). The +57
# is directional, NOT a forecast. No jitter in the backtest — real latency
# wobble (worst at this tight trigger) is untested.
#
# Strategy params: trigger 3 / entry 1 / exit 6 / max_open 1 (bare, mid-anchor).
# Live-safety = the velocity cooldown (the runner's two-layer position cap
# bounds total inventory, so no strategy net cap):
#   entry_cooldown_ms = 0    ≥0.5s between same-side entries. Caps entry burst
#                              rate (max_open_entries only caps RESTING quotes,
#                              useless for fill-on-contact entries). Also gates
#                              the -5022 requote so a cross can't reject-storm.
#   entry_from_touch  = false  price entries entry_bps from mid (mid-anchor won
#                              the sweep; touch-anchor fills more but doesn't
#                              cut the -5022 rate — flip to true to try it live).
#
# Pre-flight (mainnet):
#   1. TIKR_BINANCE_ENABLE_MAINNET=1
#   2. .env with TIKR_BINANCE_FUTURES_API_KEY / _API_SECRET
#   3. Funded USDC balance in Futures wallet
#   4. Confirm USDC maker fee still 0 bps at binance.com/en/fee/futureFee
#   5. WATCH the first session, do not leave unattended, expect frequent -5022
#      (normal), and stop on sustained one-sided inventory piling (a trend).

[account]
env = "futures-mainnet"
state_dir = "./state/mmr-usdc-majors"
asset = "USDC"
order_balance_pct = "1"
max_position_pct = "80"
leverage = 5
inventory_boost_pct = "0"
inventory_boost_curve = "1"

# ─── NEARUSDC ─────────────────────────────────────────────────────────────
[[bot]]
symbol = "NEARUSDC"
strategy = "micro-mean-reversion"
[bot.micro_mean_reversion]
trigger_bps = 2
entry_bps = 1
exit_bps = 3
max_open_entries = 1
confirm_touch = false
tp_relax_trigger_bps = 0
tp_relax_floor_bps = 0
add_block_bps = 0
entry_cooldown_ms = 0
entry_from_touch = false

